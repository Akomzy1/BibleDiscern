<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Navy background -->
  <rect width="1024" height="1024" fill="#1B2A4A" rx="180"/>

  <!-- Subtle radial glow behind cross -->
  <radialGradient id="glow" cx="50%" cy="50%" r="35%">
    <stop offset="0%" stop-color="#C8A45E" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#C8A45E" stop-opacity="0"/>
  </radialGradient>
  <circle cx="512" cy="512" r="360" fill="url(#glow)"/>

  <!-- Gold cross — vertical bar -->
  <rect x="462" y="220" width="100" height="584" fill="#C8A45E" rx="12"/>

  <!-- Gold cross — horizontal bar -->
  <rect x="268" y="376" width="488" height="100" fill="#C8A45E" rx="12"/>

  <!-- Subtle inner highlight on vertical bar -->
  <rect x="474" y="220" width="20" height="584" fill="#E8D5A3" opacity="0.25" rx="6"/>
  <!-- Subtle inner highlight on horizontal bar -->
  <rect x="268" y="388" width="488" height="20" fill="#E8D5A3" opacity="0.25" rx="6"/>
</svg>
